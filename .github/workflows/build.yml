name: Gerar APK
on:
  push:
    branches: [ principal ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Baixar arquivos do repositório
        uses: actions/checkout@v4
        with:
          ref: principal

      - name: Instalar Node.js e Cordova
        run: |
          npm install -g cordova@12
          cordova telemetry off

      - name: Preparar plataforma Android
        run: cordova platform add android@12

      - name: Compilar APK
        run: cordova build android --debug

      - name: Disponibilizar APK para download
        uses: actions/upload-artifact@v4
        with:
          name: Meu-APK
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
